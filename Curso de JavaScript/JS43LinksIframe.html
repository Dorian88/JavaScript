<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Links con Iframe</title>
        
        <link rel="stylesheet" type="text/css" href="Jquery/fancybox/jquery.fancybox-1.3.4.css">
        
		<style>
			body{
				background-color: #030;
			}
			
			#principal{
				margin: 50px 0 0 75px;
			}
			
			h1{
				color: #FFF;
			}
			
			ul{
				list-style: none;
			}
			
			ul li{
				font-size: 1.3em;
				margin-bottom: 5px;
			}
			
			li a:link{
				color: #FFF;
			}
			
			li a:visited{
				color: #FFF;
			}
			
			li a:hover{
				color: #F00;
			}
        </style>
        
        <script src="Jquery/jquery-1.6.3.min.js"></script>
        <script src="Jquery/fancybox/jquery.fancybox-1.3.4.js"></script>
        
		<script>
			$(document).ready(function(e) {
                $(".iframe").fancybox({
					type:"iframe",
                    width:"90%",
					height:"90%",
					titlePosition:"outside"
				});
            });
        </script>
        
	</head>

	<body>
    	<div id="principal">
        	<h1>Links con Fancy</h1>
            <ul>
            	<li><a href="https://www.pildorasinformaticas.es" title = "Pildoras" class="iframe">Pildoras Informáticas</a></li>
                <li><a href="https://www.marca.com" title = "Marca" class="iframe">Diario Marca</a></li>
                <li><a href="https://www.as.com" title = "As" class="iframe">Diario As</a></li>
                <li><a href="https://www.mundodeportivo.es" title = "Mundo Deportivo" class="iframe">Mundo Deportivo</a></li>
                <li><a href="https://www.nba.com" title = "NBA" class="iframe">NBA</a></li>
            </ul>
        </div>
	</body>
</html>
