<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Bucle For</title>
        
        <script>
			var meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre",
						 "Octubre", "Noviembre", "Diciembre"];
			
			document.write("Primer ejemplo con el bucle for." + "<br/>");
			
			for (var i = 0; i < 10; i++){
				document.write((i+1) + ". " + "Hola" + "<br/>");
			}
			
			document.write("<br/>" + "Segundo ejemplo con el bucle for." + "<br/>");
			for (var j = 0; j < 12; j++){
				document.write((j+1) + ". " + meses[j] + "<br/>");
			}
        </script>
	</head>

	<body>
	</body>
</html>
