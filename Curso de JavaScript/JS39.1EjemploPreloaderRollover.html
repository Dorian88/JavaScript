<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Ejemplo Imagenes Preloader Rollover</title>
        
        <style>
			img{
				padding: 0 5px;
			}
			
			h1{
				text-align: center;
			}
        </style>
        
        <script src="Jquery/jquery-1.6.3.min.js"></script>
        
		<script>
			$(document).ready(function() {
				
				var fotoHover = [
					"Imagenes/Jhon Wick.jpg",
					"Imagenes/Krillin Falcon.jpg",
					"Imagenes/Lobo.jpeg",
					"Imagenes/slipknot.jpg"
				];
				
				var imagenes = [];
				
				for (var i = 0; i < fotoHover.length; i++){
					imagenes[i] = new Image()
					imagenes[i].src = fotoHover[i];
				}
				
				$("img").each(function(){
					$(this).hover(cambiar, restaurar);
				});
				
				function cambiar(e){
					if(e.target == img1){
						$("#img1").attr("src", imagenes[0].src);
					}else if(e.target == img2){
						$("#img2").attr("src", imagenes[1].src);
					}else if(e.target == img3){
						$("#img3").attr("src", imagenes[2].src);
					}else if(e.target == img4){
						$("#img4").attr("src", imagenes[3].src);
					}
				}
				
				function restaurar(e){
					if(e.target == img1){
						$("#img1").attr("src", "Imagenes/Desenfocada/Jhon Wick.jpg");
					}else if(e.target == img2){
						$("#img2").attr("src", "Imagenes/Desenfocada/Krillin Falcon.jpg");
					}else if(e.target == img3){
						$("#img3").attr("src", "Imagenes/Desenfocada/Lobo.jpeg");
					}else if(e.target == img4){
						$("#img4").attr("src", "Imagenes/Desenfocada/slipknot.jpg");
					}
				}
                
            });
        </script>
        
	</head>

	<body>
    	<h1>Galeria de Imágenes</h1>
        <table width="100%" border="0">
        	<tr>
    			<td><img src="Imagenes/Desenfocada/Jhon Wick.jpg" width="300" height="200" id="img1"></td>
        		<td><img src="Imagenes/Desenfocada/Krillin Falcon.jpg" width="300" height="200" id="img2"></td>
        		<td><img src="Imagenes/Desenfocada/Lobo.jpeg" width="300" height="200" id="img3"></td>
        		<td><img src="Imagenes/Desenfocada/slipknot.jpg" width="300" height="200" id="img4"></td>
        	</tr>
        </table>
	</body>
</html>
