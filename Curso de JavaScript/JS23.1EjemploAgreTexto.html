<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Ejemplo Agregando Texto</title>
        
        <script src="Jquery/jquery-1.6.3.min.js"></script>
        
		<script>
			
			function validar(){
				var nUsuario = document.getElementById("usuario").value;
			
				if(nUsuario == ""){
					$("#usuario").after("Rellena este campo, por favor");
				}
			}
			
        </script>
        
	</head>

	<body>
    	<form action="" method="get">
        	<input name="" type="text" id = "usuario"><br/>
            <input name="" type="text" id = "nombre"><br/>
            <input name="" type="text" id = "apellido"><br/>
            <input type="button" value = "Submit" onclick = "validar()">
        </form>
	</body>
</html>
