<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Eliminar y Reemplazar Elementos</title>
        <style>
			#banner{
				background-color:#F00;
				width:450px;
				height:300px;
				position:absolute;
				left:400px;
				top:50px;
				font-size:36px;
				text-align:center;
			}
			
			img{
				float:left;
				margin:15px;
				width:250px;
				height:250px;
			}
			
			#sustitucion{
				float:left;
				margin:15px;
				width:250px;
				height:250px;
				font-size:30px;
			}
        
        </style>
		<script src="Jquery/jquery-1.6.3.min.js"></script>
        
        <script>
			
			$(document).ready(function(){
				/*var z = document.getElementById("cerrar");
				
				z.addEventListener("click", cerrarBanner, false);*/
				
				document.getElementById("cerrar").addEventListener("click", cerrarBanner, false);
				document.getElementById("imagen1").addEventListener("click", carrito, false);
			});
			
			function cerrarBanner(){
				$("#banner").remove();
			}
			
			function carrito(){
				
				$("#imagen1").replaceWith("<div id='sustitucion'>Agregado al carro</div");
			}
        </script>
        
	</head>

	<body>
    	<div id = "banner">
        	Banner de prueba
            <p id = "cerrar">
            	Cerrar
            </p>
        </div>
        
        <div id "carrete">
			<img src="Imagenes/Lobo.jpeg" id = "imagen1">
    		<img src="Imagenes/Mario.jpeg" id = "imagen2">
			<img src="Imagenes/Silueta cara.jpg" id = "imagen3">
			<img src="Imagenes/slipknot.jpg" id = "imagen4">
        </div>
        
	</body>
</html>
