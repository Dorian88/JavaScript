<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Eliminar y Reemplazar Elementos</title>
        <style>
			#banner{
				background-color:#F00;
				width:450px;
				height:300px;
				position:absolute;
				left:400px;
				top:50px;
				font-size:36px;
				text-align:center;
			}
			
			img{
				float:left;
				margin:15px;
				width:250px;
				height:250px;
			}
			
			#imagen1, #imagen2, #imagen3, #imagen4{
				float:left;
				margin:15px;
				width:250px;
				height:250px;
				font-size:30px;
			}
        
        </style>
		<script src="Jquery/jquery-1.6.3.min.js"></script>
        
        <script>
			
			$(document).ready(function(){
				/*var z = document.getElementById("cerrar");
				
				z.addEventListener("click", cerrarBanner, false);*/
				var imagenes = document.querySelectorAll("#carrete img");
				
				document.getElementById("cerrar").addEventListener("click", cerrarBanner, false);
				
				for(var i = 0; i < imagenes.length; i++){
					imagenes[i].addEventListener("click", carrito, false);
				}
				
			});
			
			function cerrarBanner(){
				$("#banner").remove();
			}
			
			function carrito(num){
				
				if(num.target.id == "imagen1"){
					$("#imagen1").replaceWith("<div id='imagen1'>Agregado al carro</div>");
				}
				if(num.target.id == "imagen2"){
					$("#imagen2").replaceWith("<div id='imagen2'>Agregado al carro</div>");
				}
				if(num.target.id == "imagen3"){
					$("#imagen3").replaceWith("<div id='imagen3'>Agregado al carro</div>");
				}
				if(num.target.id == "imagen4"){
					$("#imagen4").replaceWith("<div id='imagen4'>Agregado al carro</div>");
				} 
			}
        </script>
        
	</head>

	<body>
    	<div id = "banner">
        	Banner de prueba
            <p id = "cerrar">
            	Cerrar
            </p>
        </div>
        
        <div id = "carrete">
			<img src="Imagenes/Lobo.jpeg" id = "imagen1">
    		<img src="Imagenes/Mario.jpeg" id = "imagen2">
			<img src="Imagenes/Silueta cara.jpg" id = "imagen3">
			<img src="Imagenes/slipknot.jpg" id = "imagen4">
        </div>
        
	</body>
</html>
