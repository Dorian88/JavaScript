<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Ejemplo Bucle For</title>
        <script>
			var trabajadores = new Array();
			var persona = "";
			var contador = 0;
			
			while(persona != "salir"){
				persona = prompt("Introduce el trabajador");
				trabajadores[contador] = persona;
				contador++;
			}
			
			trabajadores.pop();
			
			for(var i = 0; i < trabajadores.length; i++){
				document.write((i+1) + ". " + trabajadores[i] + "<br/>");
			}
        </script>
	</head>

	<body>
	</body>
</html>
