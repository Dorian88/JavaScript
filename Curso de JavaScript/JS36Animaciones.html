<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Animaciones</title>
        
        <style>
			#imagen1{
				opacity: 0.5;
			}
        </style>
        
        <script src="Jquery/jquery-1.6.3.min.js"></script>
        
		<script>
			$(document).ready(function() {
                $("#imagen").click(function(){
					$(this).animate(
						{
							marginLeft: "+=150px"
						}, 1000);
				});
				
				$("#imagen1").mouseover(function (){
					$(this).animate({
						opacity: 1
					}, 250);
				});
				
				$("#imagen1").mouseout(function (){
					$(this).animate({
						opacity: 0.5
					}, 250);
				});
            });
        </script>
        
	</head>

	<body>
    	<img src="Imagenes/slipknot.jpg" width="300" height="200" id="imagen"><br>
        <img src="Imagenes/Jhon Wick.jpg" width="300" height="200" id="imagen1">
	</body>
</html>
