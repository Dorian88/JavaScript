<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Programacion Orientado a Objetos</title>
	</head>

	<body>
    	<input type = "button" id = "boton1">
        <input type = "button" id = "boton2">
        <input type = "text" id = "miCuadro">
        
        <script>
			var miBoton1 = document.getElementById("boton1");
			var miBoton2= document.getElementById("boton2");
			var cuadroTexto = document.getElementById("miCuadro");
			
			miBoton1.style.width = "250px";
			miBoton1.style.height = "250px";
			miBoton1.style.backgroundColor = "green";
			
			miBoton2.style.width = "250px";
			miBoton2.style.height = "250px";
			miBoton2.style.backgroundColor = "blue";
			miBoton2.focus();
			
			cuadroTexto.style.background = "red";
			cuadroTexto.value = "Escriba aquí";
			cuadroTexto.style.height = "200px";			
        </script>
	</body>
</html>
