<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Ventanas Emergentes con Iframes</title>
        
        <style>
			body{
				background-color:#600;
			}
			
			h1{
				text-align:center;
				color:#FFF;
				font-weight:bold;
			}
			
			#contenedor{
				background-color:#600;
				width:500px;
				height:400px;
				margin:auto;
			}
        </style>
        
        <script src="Jquery/jquery-1.6.3.min.js"></script>
        
		<script>
			$(document).ready(function(e) {
                $("#pulsar").click(function(e){
					e.preventDefault();
					$("#externo").attr("src", "https://www.pildorasinformaticas.es");
				});
            });
        </script>
        
	</head>

	<body>
    	<h1>Curso de JavaScript</h1>
        <a href="" id="pulsar">Pulsa</a>
        <div id="contenedor"><iframe id="externo" src="" width="500" height="400" frameborder="0"></iframe></div>
	</body>
</html>
