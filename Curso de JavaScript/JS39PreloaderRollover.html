<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Imagenes Preloader Rollover</title>
        
        <script src="Jquery/jquery-1.6.3.min.js"></script>
        
		<script>
			$(document).ready(function() {
				
				var fotoNueva = new Image();
				
				fotoNueva.src = "Imagenes/slipknot.jpg";
				
				$("#foto").hover(function(){
					$(this).attr("src", fotoNueva.src);
				}, function(){
						$(this).attr("src", "Imagenes/Desenfocada/slipknot.jpg");
					});
                
            });
        </script>
        
	</head>

	<body>
    	<img src="Imagenes/Desenfocada/slipknot.jpg" width="300" height="200" id="foto">
	</body>
</html>
