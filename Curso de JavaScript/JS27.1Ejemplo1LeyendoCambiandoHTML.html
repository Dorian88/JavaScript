<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Leyendo y Cambiando Atributos HTML</title>
        
        <style>
			table{
				text-align:center;
				width:50%;
				border:none;
				margin:auto;
			}
			
			img{
				padding:0 5px;
			}
			
			h1{
				text-align:center;
			}
        </style>
        
        <script src="Jquery/jquery-1.6.3.min.js"></script>
        
		<script>
			$(document).ready(function() {
                
				var elementos = document.querySelectorAll("img");
				
				for (var i =0; i < elementos.length; i++){
					elementos[i].addEventListener("mouseover", cambiar, false);
					elementos[i].addEventListener("mouseout", restaurar, false);
				}
            });
			
			function cambiar(e){
				
				if(e.target == imagen1){
					$("#imagen1").attr("src", "Imagenes/slipknot.jpg");
				}else if(e.target == imagen2){
					$("#imagen2").attr("src", "Imagenes/Jhon Wick.jpg");
				}else if(e.target == imagen3){
					$("#imagen3").attr("src", "Imagenes/Krillin Falcon.jpg");
				}else if(e.target == imagen4){
					$("#imagen4").attr("src", "Imagenes/Lobo.jpeg");
				}
			}
			
			function restaurar(e){
				if(e.target == imagen1){
					$("#imagen1").attr("src", "Imagenes/Desenfocada/slipknot.jpg");
				}else if(e.target == imagen2){
					$("#imagen2").attr("src", "Imagenes/Desenfocada/Jhon Wick.jpg");
				}else if(e.target == imagen3){
					$("#imagen3").attr("src", "Imagenes/Desenfocada/Krillin Falcon.jpg");
				}else if(e.target == imagen4){
					$("#imagen4").attr("src", "Imagenes/Desenfocada/Lobo.jpeg");
				}
			}
        </script>
        
	</head>

	<body>
    	<h1>Galería de imágenes</h1>
        <table width="100%" border="0">
        	<tr>
            	<td><img src="Imagenes/Desenfocada/slipknot.jpg" id="imagen1" width="200px"></td>
        		<td><img src="Imagenes/Desenfocada/Jhon Wick.jpg" id="imagen2" width="200px"></td>
        		<td><img src="Imagenes/Desenfocada/Krillin Falcon.jpg" id="imagen3" width="200px"></td>
        		<td><img src="Imagenes/Desenfocada/Lobo.jpeg" id="imagen4" width="200px"></td>
            </tr>
        </table>
	</body>
</html>
