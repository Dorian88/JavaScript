<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Funciones</title>
        
		<style type="text/css">
			.centrado {
				text-align: center;
			}
		</style>
        
        <script>
			function diaDeHoy(){
				var hoy = new Date();
				
				document.write(hoy.toDateString());
			}
    	</script>
	</head>

	<body>
		<h1 class="centrado"><strong>¿Y que día es hoy?</strong></h1>
    	<p>Hoy es: <script>diaDeHoy();</script></p>
	</body>
</html>
