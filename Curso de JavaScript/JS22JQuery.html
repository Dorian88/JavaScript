<!DOCTYPE html>

		<title>Usando JQuery</title>
        
        <style>
			#anuncio{
				background-color: #000;

				font-size: 24px;
			}
        
        </style>
        
        <script src="Jquery/jquery-1.6.3.min.js"></script>
        
        <script>
			$(document).ready(function() {
                $("#carrete img").hide().fadeIn(5000); //Oculta y muestra elementos 
            });
        </script>
        
        <script>
			$(document).ready(function() {
                $("#anuncio").width(500).height(500).text("¡VENDE!").hide().fadeIn(10000); //Funciones encadenadas
            });
        </script>
        
	</head>

	<body>

            &nbsp;
            <img src = "Imagenes/Krillin Falcon.jpg", width = "250" height= "175">
        </div>
