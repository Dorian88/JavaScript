<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Arrays</title>
        <link rel="stylesheet" href="Css/CssJS06.css">
        <script>
			var articulos = ["Zapatillas", "Camiseta", "Pantalón", "Medias"];
			//var articulos = new Array("Zapatillas", "Camiseta", "Pantalón", "Medias");
			//var articulos = [];
		</script>
	</head>

	<body>
    	<div class="contenedor">
        	<div class="header">
            	<p class="logo">Arrays en <i class = "mm">JavaScript
                </p>
            </div>
            <div class="contenido">
            	<div="principal">
                	<h1>Manejando Arrays</h1>
                    <script>
						document.write("<p>El primer artículo es <strong>");
						document.write(articulos[0] + "</strong></p>");
						document.write("<p>El último artículo es <strong>");
						document.write(articulos[articulos.length-1] + "</strong></p>");
						
						articulos.unshift("Balón");
						document.write("<p>Agregamos otro artículo <strong>");
						document.write(articulos[0] + "</strong></p>");
						
						articulos.push(prompt("Introduce un artículo"));
						document.write("<p>Agregamos otro artículo al final <strong>");
						document.write(articulos[articulos.length-1] + "</strong></p>");
						
						document.write("<p>" + articulos[0] + "<br/>");
						document.write(articulos[1] + "<br/>");
						document.write(articulos[2] + "<br/>");
						document.write(articulos[3] + "<br/>");
						document.write(articulos[4] + "<br/>");
						document.write(articulos[5] + "<br/></p>");
						
						alert("Borraremos el primer elemento")
						articulos.shift();
						document.write("<p>" + articulos[0] + "<br/>");
						document.write(articulos[1] + "<br/>");
						document.write(articulos[2] + "<br/>");
						document.write(articulos[3] + "<br/>");
						document.write(articulos[4] + "<br/></p>");
						
						alert("Borraremos el último elemento elemento")
						articulos.pop();
						document.write("<p>" + articulos[0] + "<br/>");
						document.write(articulos[1] + "<br/>");
						document.write(articulos[2] + "<br/>");
						document.write(articulos[3] + "<br/></p>");
						
                    </script>
                </div>
            </div>
        </div>
	</body>
</html>
