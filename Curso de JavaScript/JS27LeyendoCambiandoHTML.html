<!DOCTYPE html> 
<html>
	<head>
		<meta charset="utf-8" />
		<title>Leyendo y Cambiando Atributos HTML</title>
        
        <script src="Jquery/jquery-1.6.3.min.js"></script>
        
		<script>
			$(document).ready(function() {
                document.getElementById("imagen1").addEventListener("mouseover", cambiar, false);
				document.getElementById("imagen1").addEventListener("mouseout", restaurar, false);
            });
			
			function cambiar (){
				$("img").attr("src", "Imagenes/Mario.jpeg");
			}
			
			function restaurar (){
				$("img").attr("src", "Imagenes/slipknot.jpg");
			}
        </script>
        
	</head>

	<body>
    	<img src="Imagenes/slipknot.jpg" id="imagen1" width="200px">
	</body>
</html>
